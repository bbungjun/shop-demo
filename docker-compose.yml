services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: shopping-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      PORT: 3000
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  web_node_modules:
  web_next:
