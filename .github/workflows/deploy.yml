name: Deploy To EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'shopping-demo' }}
  ECR_WEB_REPOSITORY: ${{ vars.ECR_WEB_REPOSITORY }}
  ECR_API_REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}

jobs:
  deploy:
    name: Build Push And Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.EKS_CLUSTER_NAME }}"
          test -n "${{ vars.ECR_WEB_REPOSITORY }}"
          test -n "${{ vars.ECR_API_REPOSITORY }}"
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}"

      - name: Debug workflow inputs
        run: |
          echo "AWS_REGION=${{ vars.AWS_REGION }}"
          echo "EKS_CLUSTER_NAME=${{ vars.EKS_CLUSTER_NAME }}"
          echo "ECR_WEB_REPOSITORY=${{ vars.ECR_WEB_REPOSITORY }}"
          echo "ECR_API_REPOSITORY=${{ vars.ECR_API_REPOSITORY }}"
          echo "K8S_NAMESPACE=${{ vars.K8S_NAMESPACE || 'shopping-demo' }}"
          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "AWS_ROLE_TO_ASSUME is set"
          else
            echo "AWS_ROLE_TO_ASSUME is missing"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: vars
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_WEB_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_WEB_REPOSITORY }}:latest

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./mock-api
          file: ./mock-api/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_API_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_API_REPOSITORY }}:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ vars.EKS_CLUSTER_NAME }}" --region "${{ vars.AWS_REGION }}"

      - name: Apply base manifests
        run: kubectl apply -k k8s

      - name: Update deployment images
        run: |
          kubectl set image deployment/shopping-web \
            shopping-web=${{ steps.vars.outputs.registry }}/${{ vars.ECR_WEB_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }} \
            -n "$K8S_NAMESPACE"
          kubectl set image deployment/shopping-api \
            shopping-api=${{ steps.vars.outputs.registry }}/${{ vars.ECR_API_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }} \
            -n "$K8S_NAMESPACE"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/shopping-web -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/shopping-api -n "$K8S_NAMESPACE" --timeout=300s
