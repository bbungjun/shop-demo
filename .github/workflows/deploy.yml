name: Deploy To EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      web_image_tag:
        description: Web image tag to deploy. Leave empty to use the current commit SHA.
        required: false
        type: string
      api_image_tag:
        description: API image tag to deploy. Leave empty to use the current commit SHA.
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'shopping-demo' }}
  ECR_WEB_REPOSITORY: ${{ vars.ECR_WEB_REPOSITORY }}
  ECR_API_REPOSITORY: ${{ vars.ECR_API_REPOSITORY }}

jobs:
  deploy:
    name: Build Push And Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.EKS_CLUSTER_NAME }}"
          test -n "${{ vars.ECR_WEB_REPOSITORY }}"
          test -n "${{ vars.ECR_API_REPOSITORY }}"
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}"

      - name: Debug workflow inputs
        run: |
          echo "AWS_REGION=${{ vars.AWS_REGION }}"
          echo "EKS_CLUSTER_NAME=${{ vars.EKS_CLUSTER_NAME }}"
          echo "ECR_WEB_REPOSITORY=${{ vars.ECR_WEB_REPOSITORY }}"
          echo "ECR_API_REPOSITORY=${{ vars.ECR_API_REPOSITORY }}"
          echo "K8S_NAMESPACE=${{ vars.K8S_NAMESPACE || 'shopping-demo' }}"
          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "AWS_ROLE_TO_ASSUME is set"
          else
            echo "AWS_ROLE_TO_ASSUME is missing"
            exit 1
          fi

      - name: Normalize workflow inputs
        run: |
          echo "AWS_REGION=$(echo '${{ vars.AWS_REGION }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_ENV"
          echo "EKS_CLUSTER_NAME=$(echo '${{ vars.EKS_CLUSTER_NAME }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_ENV"
          echo "ECR_WEB_REPOSITORY=$(echo '${{ vars.ECR_WEB_REPOSITORY }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_ENV"
          echo "ECR_API_REPOSITORY=$(echo '${{ vars.ECR_API_REPOSITORY }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_ENV"
          echo "K8S_NAMESPACE=$(echo '${{ vars.K8S_NAMESPACE || 'shopping-demo' }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: vars
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ github.event.inputs.web_image_tag }}" ]; then
            echo "web_tag=$(echo '${{ github.event.inputs.web_image_tag }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_OUTPUT"
          else
            echo "web_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ github.event.inputs.api_image_tag }}" ]; then
            echo "api_tag=$(echo '${{ github.event.inputs.api_image_tag }}' | tr -d '\r\n' | xargs)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push web image
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.web_image_tag == '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_WEB_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_WEB_REPOSITORY }}:latest

      - name: Build and push api image
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.api_image_tag == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./mock-api
          file: ./mock-api/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_API_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }}
            ${{ steps.vars.outputs.registry }}/${{ vars.ECR_API_REPOSITORY }}:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Apply base manifests
        run: kubectl apply -k k8s

      - name: Update deployment images
        run: |
          kubectl set image deployment/shopping-web \
            shopping-web=${{ steps.vars.outputs.registry }}/${{ vars.ECR_WEB_REPOSITORY }}:${{ steps.vars.outputs.web_tag }} \
            -n "$K8S_NAMESPACE"
          if [ -n "${{ steps.vars.outputs.api_tag }}" ]; then
            kubectl set image deployment/shopping-api \
              shopping-api=${{ steps.vars.outputs.registry }}/${{ vars.ECR_API_REPOSITORY }}:${{ steps.vars.outputs.api_tag }} \
              -n "$K8S_NAMESPACE"
          fi

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/shopping-web -n "$K8S_NAMESPACE" --timeout=300s
          if [ -n "${{ steps.vars.outputs.api_tag }}" ]; then
            kubectl rollout status deployment/shopping-api -n "$K8S_NAMESPACE" --timeout=300s
          fi
