name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-checks:
    name: Web Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: ./mock-api
          file: ./mock-api/Dockerfile
          push: false
